<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENGSE203 LAB 3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script type="module" src="/src/main.js"></script>
</head>
<body>
  <header class="hero">
    <div class="container">
      <p class="eyebrow">ENGSE203 • LAB 3</p>
      <h1>Campus Service Request</h1>
      <p>Responsive Web UI, Event and Form</p>
    </div>
  </header>
  <main class="container page-grid">
    <section class="panel" aria-labelledby="form-title">
      <h2 id="form-title">Create Service Request</h2>
      <form id="request-form" novalidate>
        <!-- TODO 1: Requester Name field -->
        <div class="field">
          <label for="requester-name">Requester Name</label>
          <input
            id="requester-name"
            name="requesterName"
            type="text"
            minlength="2"
            placeholder="e.g. John Smith"
            aria-describedby="requesterName-hint requesterName-error"
            required />
          <small id="requesterName-hint" class="hint">กรุณากรอกอย่างน้อย 2 ตัวอักษร</small>
          <small id="requesterName-error" class="error"></small>
        </div>

        <!-- TODO 2: Request Type select -->
        <div class="field">
          <label for="request-type">Request Type</label>
          <select id="request-type" name="requestType" aria-describedby="requestType-error" required>
            <option value="">-- Select a type --</option>
            <option value="Maintenance">Maintenance</option>
            <option value="IT Support">IT Support</option>
            <option value="Facility">Facility</option>
            <option value="Other">Other</option>
          </select>
          <small id="requestType-error" class="error"></small>
        </div>

        <!-- TODO 3: Details textarea -->
        <div class="field">
          <label for="details">Details</label>
          <textarea
            id="details"
            name="details"
            rows="5"
            minlength="10"
            placeholder="Describe your request..."
            aria-describedby="details-hint details-error"
            required></textarea>
          <small id="details-hint" class="hint">กรุณากรอกอย่างน้อย 10 ตัวอักษร</small>
          <small id="details-error" class="error"></small>
        </div>

        <button type="submit">Submit Request</button>
        <p id="form-status" class="status" role="status"></p>
      </form>
    </section>

    <aside class="panel preview-panel" aria-labelledby="preview-title">
      <h2 id="preview-title">Live Preview</h2>
      <article class="profile-card" aria-live="polite">
        <p class="profile-card__label">Name</p>
        <h3 id="preview-name">ยังไม่ระบุชื่อ</h3>
        <p class="profile-card__label" style="margin-top: .75rem;">Type</p>
        <p class="role" id="preview-type">ยังไม่เลือกประเภท</p>
        <p class="profile-card__label" style="margin-top: .75rem;">Details</p>
        <p class="goal" id="preview-details">ยังไม่มีรายละเอียด</p>
      </article>
      <h3>Submitted Requests</h3>
      <ul id="request-list" class="request-list"></ul>
    </aside>
  </main>
</body>
</html>
